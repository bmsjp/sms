<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>来店きっかけアンケート</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#FDF8F0}
.frame-wrap{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch}
iframe{width:100%;height:100%;min-height:100%;border:none;display:block}
</style>
</head>
<body>
<div class="frame-wrap">
<iframe id="frame" scrolling="yes"></iframe>
</div>
<script>
var GAS_BASE_URL='https://script.google.com/macros/s/AKfycbymU-nRBSnHYEYWDOdb4Rm6qX25AwcQZTxSYsS-TYtGHvd7DH49Mxkk1wQH03Ptv2hghw/exec';
var params=new URLSearchParams(window.location.search);
var page=params.get('page')||'';
var src=GAS_BASE_URL;
if(page)src+='?page='+encodeURIComponent(page);
document.getElementById('frame').src=src;
</script>
</body>
</html>
